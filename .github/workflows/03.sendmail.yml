name: Commit Notification Mail

on:
  push:

jobs:
  send-mail:
    runs-on: ubuntu-latest

    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: "🚀 New Commit in Repository"

          to: itzmani2005@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}

          body: |
            🚀 New Commit Pushed

            Repository: ${{ github.repository }}

            Committed By:
            ${{ github.actor }}

            Commit Message:
            ${{ github.event.head_commit.message }}

            Commit Time:
            ${{ github.event.head_commit.timestamp }}

            Branch:
            ${{ github.ref_name }}

            Commit URL:
            ${{ github.event.head_commit.url }}

          html_body: |
            <h2>🚀 New Commit Pushed</h2>

            <p><strong>Repository:</strong>
            ${{ github.repository }}</p>

            <p><strong>Committed By:</strong>
            ${{ github.actor }}</p>

            <p><strong>Commit Message:</strong></p>

            <blockquote>
              ${{ github.event.head_commit.message }}
            </blockquote>

            <p><strong>Commit Time:</strong>
            ${{ github.event.head_commit.timestamp }}</p>

            <p><strong>Branch:</strong>
            ${{ github.ref_name }}</p>

            <p>
              <a href="${{ github.event.head_commit.url }}">
                View Commit
              </a>
            </p>